<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Toko wiinmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" x-data="tokoApp()">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 @click="page = 'home'" class="text-xl md:text-2xl font-bold text-green-600 tracking-tight cursor-pointer">TOKO<span class="text-orange-500">WIINMART</span></h1>
            <div class="flex items-center space-x-4">
                <div class="hidden md:flex space-x-6 font-medium">
                    <a @click="page = 'home'" href="#" class="hover:text-green-600">Home</a>
                    <a @click="page = 'produk'" href="#" class="hover:text-green-600">Produk</a>
                    <a @click="page = 'tentang'" href="#" class="hover:text-green-600">Tentang Kami</a>
                </div>
                <button @click="loginAdmin()" class="text-gray-500 hover:text-green-600 p-2">
                    <i class="fa fa-user-shield text-lg"></i>
                </button>
            </div>
        </div>
        <div class="md:hidden flex justify-around bg-white border-t py-2 text-xs font-bold uppercase text-gray-500">
            <button @click="page = 'home'" :class="page === 'home' ? 'text-green-600' : ''">Home</button>
            <button @click="page = 'produk'" :class="page === 'produk' ? 'text-green-600' : ''">Produk</button>
            <button @click="page = 'tentang'" :class="page === 'tentang' ? 'text-green-600' : ''">Tentang</button>
        </div>
    </nav>

    <template x-if="page === 'home'">
        <div class="overflow-hidden">
            <section class="bg-green-600 py-10 md:py-16 px-4 text-center text-white">
                <h2 class="text-2xl md:text-5xl font-bold mb-4">Belanja Harian Jadi Mudah</h2>
                <p class="mb-6 md:mb-8 opacity-90 text-sm md:text-base">Cari produk kebutuhan Anda di bawah ini</p>
                <div class="max-w-xl mx-auto flex shadow-lg rounded-lg overflow-hidden">
                    <input type="text" x-model="search" placeholder="Cari beras, mie, sabun..." class="w-full px-4 py-3 text-gray-900 text-sm focus:outline-none">
                    <button @click="page = 'produk'" class="bg-orange-500 px-4 md:px-6 py-3 hover:bg-orange-600 transition"><i class="fa fa-search"></i></button>
                </div>
            </section>

            <section class="container mx-auto py-8 md:py-12 px-4">
                <h3 class="text-lg font-bold mb-6 border-l-4 border-green-600 pl-3 uppercase tracking-wide">Kategori Pilihan</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                    <template x-for="cat in categories" :key="cat">
                        <div @click="filterCategory(cat)" class="bg-white p-4 md:p-6 rounded-xl shadow-sm hover:shadow-md cursor-pointer text-center border border-gray-100 transition">
                            <i class="fa fa-box text-green-500 text-xl md:text-2xl mb-2"></i>
                            <p class="font-semibold text-sm md:text-base" x-text="cat"></p>
                        </div>
                    </template>
                </div>
            </section>

            <section class="container mx-auto py-4 px-4" x-data="{ 
                activeSlide: 1, 
                totalSlides: 2, 
                init() { 
                    setInterval(() => { this.activeSlide = this.activeSlide === this.totalSlides ? 1 : this.activeSlide + 1 }, 5000) 
                } 
            }">
                <h3 class="text-lg font-bold mb-4 border-l-4 border-orange-500 pl-3 uppercase tracking-wide">Promo Spesial</h3>
                <div class="relative w-full aspect-[16/9] md:aspect-video overflow-hidden rounded-2xl shadow-lg bg-gray-200">
                    <div x-show="activeSlide === 1" x-transition.opacity.duration.500ms class="absolute inset-0">
                        <img src="banner.png" class="w-full h-full object-cover" alt="Banner 1">
                    </div>
                    <div x-show="activeSlide === 2" x-transition.opacity.duration.500ms class="absolute inset-0">
                        <img src="best-seller.png" class="w-full h-full object-cover" alt="Banner 2">
                    </div>
                    <button @click="activeSlide = activeSlide === 1 ? totalSlides : activeSlide - 1" class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 bg-black/20 hover:bg-black/50 p-2 md:p-3 rounded-full text-white transition">
                        <i class="fa fa-chevron-left text-sm md:text-base"></i>
                    </button>
                    <button @click="activeSlide = activeSlide === totalSlides ? 1 : activeSlide + 1" class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 bg-black/20 hover:bg-black/50 p-2 md:p-3 rounded-full text-white transition">
                        <i class="fa fa-chevron-right text-sm md:text-base"></i>
                    </button>
                </div>
            </section>

            <section class="container mx-auto py-8 px-4">
                <h3 class="text-lg font-bold mb-4 border-l-4 border-green-600 pl-3 uppercase tracking-wide">Video Produk</h3>
                <div class="w-full aspect-[16/9] md:aspect-video overflow-hidden rounded-2xl shadow-lg bg-black">
                    <video autoplay loop muted playsinline class="w-full h-full object-cover">
                        <source src="haleeb.mp4" type="video/mp4">
                    </video>
                </div>
            </section>
        </div>
    </template>

    <template x-if="page === 'produk'">
        <section class="container mx-auto py-6 md:py-10 px-4">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <h2 class="text-2xl font-bold">Katalog Produk</h2>
                <div class="flex flex-wrap gap-2 w-full md:w-auto">
                    <button @click="selectedCategory = 'Semua'" :class="selectedCategory === 'Semua' ? 'bg-green-600 text-white' : 'bg-white text-gray-600 border'" class="px-3 py-1.5 md:px-4 md:py-2 rounded-full text-xs md:text-sm font-medium">Semua</button>
                    <template x-for="cat in categories">
                        <button @click="selectedCategory = cat" :class="selectedCategory === cat ? 'bg-green-600 text-white' : 'bg-white text-gray-600 border'" class="px-3 py-1.5 md:px-4 md:py-2 rounded-full text-xs md:text-sm font-medium" x-text="cat"></button>
                    </template>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6">
                <template x-for="p in filteredProducts" :key="p.id">
                    <div class="bg-white rounded-xl md:rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition flex flex-col">
                        <div class="h-32 md:h-48 bg-gray-200 relative">
                            <img :src="p.foto || 'https://via.placeholder.com/400x300?text=No+Image'" class="w-full h-full object-cover">
                            <div :class="p.stok === 'Tersedia' ? 'bg-green-500' : 'bg-red-500'" class="absolute top-2 right-2 text-white text-[8px] md:text-[10px] px-1.5 py-0.5 md:px-2 md:py-1 rounded-full uppercase font-bold" x-text="p.stok"></div>
                        </div>
                        <div class="p-3 md:p-4 flex-grow">
                            <p class="text-[10px] md:text-xs text-green-600 font-bold uppercase mb-1" x-text="p.kategori"></p>
                            <h4 class="font-bold text-sm md:text-lg mb-1 md:mb-2 line-clamp-2 h-10 md:h-14" x-text="p.nama"></h4>
                            <p class="text-orange-600 font-bold text-base md:text-xl mb-3 md:mb-4" x-text="formatRupiah(p.harga)"></p>
                            <button @click="openDetail(p)" class="w-full bg-gray-100 text-gray-700 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-semibold hover:bg-gray-200 transition">Detail</button>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </template>

    <template x-if="page === 'tentang'">
        <section class="container mx-auto py-10 md:py-16 px-4">
            <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center gap-6 md:gap-10">
                <div class="w-full md:w-1/2 rounded-2xl md:rounded-3xl overflow-hidden shadow-xl">
                    <img src="ad26eff9-2c5f-4c17-bc41-a9f73ab21cad.jpg" alt="Toko" class="w-full h-64 md:h-[400px] object-cover">
                </div>
                <div class="w-full md:w-1/2 text-center md:text-left">
                    <h2 class="text-2xl md:text-3xl font-bold mb-4 md:mb-6 text-green-600 uppercase">Dedikasi Kami</h2>
                    <p class="text-gray-600 leading-relaxed mb-6 text-sm md:text-base">Selamat datang di Toko wiinmart. Belanja tanpa batas, berkah tanpa henti.</p>
                    <div class="flex justify-center md:justify-start space-x-6">
                        <a href="https://www.instagram.com/wiinmart3" class="text-2xl text-pink-600"><i class="fab fa-instagram"></i></a>
                        <a href="https://www.tiktok.com/@wiin.mart8" class="text-2xl text-black"><i class="fab fa-tiktok"></i></a>
                        <a href="https://wa.me/6285397419715" class="text-2xl text-green-500"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <div x-show="detailModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" x-cloak x-transition>
        <div @click.away="detailModal = false" class="bg-white rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl relative">
            <button @click="detailModal = false" class="absolute top-4 right-4 z-10 bg-white/80 backdrop-blur rounded-full p-2 shadow-md">&times;</button>
            <div class="h-56 md:h-72">
                <img :src="activeProduct?.foto || 'https://via.placeholder.com/400x300?text=No+Image'" class="w-full h-full object-cover">
            </div>
            <div class="p-5 md:p-8">
                <h3 class="text-xl md:text-2xl font-bold mb-2 uppercase" x-text="activeProduct?.nama"></h3>
                <p class="text-2xl font-bold text-orange-600 mb-4" x-text="formatRupiah(activeProduct?.harga)"></p>
                <a :href="'https://wa.me/6285397419715?text=Halo Wiinmart, saya mau Beli: ' + activeProduct?.nama" class="block w-full bg-green-600 text-white text-center py-3.5 rounded-xl font-bold shadow-lg hover:bg-green-700 transition">Beli Sekarang</a>
            </div>
        </div>
    </div>

    <div x-show="adminModal" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-2 md:p-4" x-cloak x-transition>
        <div class="bg-white p-5 md:p-8 rounded-2xl w-full max-w-4xl max-h-[95vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center mb-6 sticky top-0 bg-white py-2 z-10">
                <h3 class="text-xl md:text-2xl font-bold text-gray-800" x-text="editMode ? 'Edit Produk' : 'Tambah Produk'"></h3>
                <button @click="closeAdminPanel()" class="text-gray-400 hover:text-red-500 transition text-2xl">&times;</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-green-50 p-4 rounded-2xl border border-green-100">
                <input type="text" x-model="form.nama" placeholder="Nama Produk" class="p-2.5 border rounded-lg">
                <input type="number" x-model="form.harga" placeholder="Harga (Rp)" class="p-2.5 border rounded-lg">
                <select x-model="form.kategori" class="p-2.5 border rounded-lg">
                    <template x-for="cat in categories">
                        <option :value="cat" x-text="cat"></option>
                    </template>
                </select>
                <select x-model="form.stok" class="p-2.5 border rounded-lg">
                    <option value="Tersedia">Tersedia</option>
                    <option value="Habis">Habis</option>
                </select>
                <div class="md:col-span-2">
                    <label class="text-xs font-bold text-green-700 uppercase">Foto Produk (Galeri)</label>
                    <input type="file" id="admFile" accept="image/*" class="w-full p-2 border rounded-lg bg-white mb-2">
                    <input type="text" x-model="form.foto" placeholder="Atau tempel link foto di sini" class="w-full p-2.5 border rounded-lg">
                </div>
                <textarea x-model="form.detail" rows="2" placeholder="Deskripsi" class="p-2.5 border rounded-lg md:col-span-2"></textarea>
                <button @click="saveProduct()" class="md:col-span-2 bg-green-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-green-700 transition" x-text="editMode ? 'UPDATE DATA' : 'TAMBAH PRODUK'"></button>
            </div>

            <div class="table-responsive bg-white rounded-xl border">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="bg-gray-100 border-b text-gray-600 uppercase text-[10px]">
                            <th class="p-3 text-left">Nama</th>
                            <th class="p-3 text-left">Harga</th>
                            <th class="p-3 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y">
                        <template x-for="p in products" :key="p.id">
                            <tr class="hover:bg-gray-50 transition">
                                <td class="p-3 font-semibold text-gray-700" x-text="p.nama"></td>
                                <td class="p-3 text-orange-600 font-bold" x-text="formatRupiah(p.harga)"></td>
                                <td class="p-3">
                                    <div class="flex justify-center space-x-3">
                                        <button @click="editProduct(p)" class="text-blue-500 p-1"><i class="fa fa-edit text-lg"></i></button>
                                        <button @click="deleteProduct(p.id)" class="text-red-500 p-1"><i class="fa fa-trash text-lg"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t py-12">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-xl font-bold text-green-600 mb-6 uppercase tracking-widest">Toko Wiinmart</h1>
            <div class="flex justify-center space-x-8 mb-8">
                <a href="https://www.instagram.com/wiinmart3" class="text-gray-400 hover:text-pink-500 transition text-2xl"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@wiin.mart8" class="text-gray-400 hover:text-black transition text-2xl"><i class="fab fa-tiktok"></i></a>
                <a href="https://wa.me/6285397419715" class="text-gray-400 hover:text-green-500 transition text-2xl"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p class="text-gray-500 text-xs md:text-sm">© 2026 Katalog Toko Wiinmart. Modern Shopping Experience.</p>
        </div>
    </footer>

    <script>
        function tokoApp() {
            const initialProducts = [
                { id: 1, nama: 'Beras Premium 1kg', kategori: 'Sembako', harga: 17000, stok: 'Tersedia', detail: 'Beras pulen kualitas super kemasan 1kg.', foto: 'https://asset.kompas.com/crops/DyKeOYffIJ_5yMrf7ZrcFe6vyr0=/0x0:1000x667/1200x800/data/photo/2024/02/23/65d89598cff5b.jpg' },
                { id: 2, nama: 'Indomie Goreng', kategori: 'Sembako', harga: 3500, stok: 'Tersedia', detail: 'Mie instan goreng rasa original.', foto: 'https://tse3.mm.bing.net/th/id/OIP.8O8e3Ak3OzwpuzqBorYHkwHaFU?pid=Api&P=0&h=180' }
            ];

            return {
                page: 'home',
                search: '',
                selectedCategory: 'Semua',
                detailModal: false,
                adminModal: false,
                activeProduct: null,
                editMode: false,
                categories: ['Sembako', 'Sabun', 'Minuman', 'Kebutuhan Rumah'],
                products: JSON.parse(localStorage.getItem('wiinmart_db')) || initialProducts,
                form: { id: null, nama: '', harga: '', kategori: 'Sembako', stok: 'Tersedia', detail: '', foto: '' },

                loginAdmin() {
                    let password = prompt("Masukkan Kata Sandi Admin:");
                    if (password === "admin123") {
                        this.adminModal = true;
                    } else if (password !== null) {
                        alert("Kata sandi salah!");
                    }
                },

                saveProduct() {
                    if (!this.form.nama || !this.form.harga) return alert("Nama dan Harga wajib diisi");
                    
                    const fileInput = document.getElementById('admFile');
                    const processData = (imageSrc) => {
                        if (imageSrc) this.form.foto = imageSrc;
                        if (this.editMode) {
                            const index = this.products.findIndex(p => p.id === this.form.id);
                            if (index !== -1) this.products[index] = { ...this.form };
                        } else {
                            const newProd = { ...this.form, id: Date.now() };
                            this.products.unshift(newProd);
                        }
                        this.persist();
                        this.resetForm();
                        if(fileInput) fileInput.value = "";
                        alert("Berhasil disimpan!");
                    };

                    if (fileInput && fileInput.files && fileInput.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (e) => processData(e.target.result);
                        reader.readAsDataURL(fileInput.files[0]);
                    } else {
                        processData(this.form.foto);
                    }
                },

                editProduct(p) {
                    this.editMode = true;
                    this.form = { ...p };
                    document.querySelector('[x-show="adminModal"] .overflow-y-auto').scrollTo({ top: 0, behavior: 'smooth' });
                },

                deleteProduct(id) {
                    if (confirm('Hapus produk ini?')) {
                        this.products = this.products.filter(p => p.id !== id);
                        this.persist();
                    }
                },

                persist() { localStorage.setItem('wiinmart_db', JSON.stringify(this.products)); },
                resetForm() {
                    this.form = { id: null, nama: '', harga: '', kategori: 'Sembako', stok: 'Tersedia', detail: '', foto: '' };
                    this.editMode = false;
                },
                closeAdminPanel() { this.adminModal = false; this.resetForm(); },
                get filteredProducts() {
                    return this.products.filter(p => {
                        const matchSearch = p.nama.toLowerCase().includes(this.search.toLowerCase());
                        const matchCat = this.selectedCategory === 'Semua' || p.kategori === this.selectedCategory;
                        return matchSearch && matchCat;
                    });
                },
                filterCategory(cat) { this.selectedCategory = cat; this.page = 'produk'; },
                openDetail(p) { this.activeProduct = p; this.detailModal = true; },
                formatRupiah(num) { return 'Rp ' + (num ? parseInt(num).toLocaleString('id-ID') : '0'); }
            }
        }
    </script>
</body>
</html>
